<!DOCTYPE html>
<html lang="es-MX">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Préstamo Personal Santander</title>
  <style>
    /* ... (mismo código de estilos que me pasaste) ... */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "SantanderHeadline", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #1a1a1a; overflow-x: hidden; }
    .header { background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08); position: sticky; top: 0; z-index: 100; }
    .logo-text { color: #EC0000; font-size: 28px; font-weight: bold; letter-spacing: 1px; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; }
    .hero-section { background: linear-gradient(135deg, #EC0000 0%, #C40000 100%); padding: 40px 20px 30px; position: relative; overflow: hidden; }
    .amount-box { background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); text-align: center; position: relative; }
    .amount-value { color: #EC0000; font-size: 42px; font-weight: 800; margin-bottom: 8px; }
    .amount-slider { width: 100%; height: 8px; border-radius: 5px; background: #e0e0e0; outline: none; -webkit-appearance: none; }
    .cta-button { width: 100%; padding: 18px; background: linear-gradient(135deg, #EC0000 0%, #C40000 100%); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
    /* [Mantenemos todos tus estilos] */
    .header-left, .menu-icon { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #EC0000; gap: 4px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.2); }
    h1 { color: #fff; font-size: 32px; font-weight: 700; margin-bottom: 12px; line-height: 1.2; }
    .hero-description { color: rgba(255, 255, 255, 0.9); font-size: 15px; line-height: 1.5; margin-bottom: 30px; }
    .amount-label { color: #5c5c5c; font-size: 13px; margin-bottom: 8px; font-weight: 500; }
    .amount-subtitle { color: #2e7d32; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; }
    .slider-labels { display: flex; justify-content: space-between; color: #5c5c5c; font-size: 12px; font-weight: 600; }
    .content { padding: 30px 20px; }
    .features-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px; }
    .feature-card { background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); padding: 10px 16px; border-radius: 12px; text-align: center; border: 1px solid #e0e0e0; }
    .feature-icon { font-size: 28px; color: #EC0000; margin-bottom: 10px; }
    .feature-title { color: #EC0000; font-size: 14px; font-weight: 700; }
    .feature-text { color: #5c5c5c; font-size: 12px; }
    .benefits-section { background: #f8f9fa; padding: 25px; border-radius: 12px; margin-bottom: 25px; }
    .benefit-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 14px; }
    .benefit-icon { color: #2e7d32; font-size: 16px; width: 20px; }
    .footer-info { background: #fff4e5; border-left: 4px solid #f7b500; padding: 16px; margin-top: 25px; border-radius: 8px; font-size: 11px; color: #5c5c5c; }
  </style>
</head>

<body>
  <div class="header">
    <div class="header-left"><i class="fa-regular fa-user" style="font-size: 20px"></i><span>Acceso</span></div>
    <div class="logo-text">Santander</div>
    <div class="menu-icon"><i class="fa-solid fa-bars" style="font-size: 20px"></i><span>Menú</span></div>
  </div>

  <div class="container">
    <div class="hero-section">
      <span class="badge"><i class="fa-solid fa-star"></i> OFERTA EXCLUSIVA</span>
      <h1>Préstamo Personal Inmediato</h1>
      <p class="hero-description">Préstamos personales para cubrir cualquier eventualidad. Aprobación inmediata.</p>

      <div class="amount-box">
        <div class="amount-label">Selecciona tu monto</div>
        <div class="amount-value" id="amountDisplay">$250,000</div>

        <div class="slider-container">
          <input type="range" id="amountSlider" min="20000" max="500000" step="10000" value="250000" class="amount-slider">
          <div class="slider-labels"><span>$20K</span><span>$500K</span></div>
        </div>

        <button class="cta-button" onclick="consultarOferta()">
          Consultar oferta <i class="fa-solid fa-arrow-right"></i>
        </button>

        <div class="amount-subtitle"><i class="fa-solid fa-bolt"></i>Aprobación en minutos</div>
      </div>
    </div>

    <div class="content">
      <div class="features-grid">
        <div class="feature-card"><div class="feature-icon"><i class="fa-regular fa-calendar"></i></div><div class="feature-title">6 a 72 meses</div></div>
        <div class="feature-card"><div class="feature-icon"><i class="fa-solid fa-shield-halved"></i></div><div class="feature-title">Sin seguro</div></div>
      </div>
      <div class="benefits-section">
        <div class="benefit-item"><i class="fa-solid fa-check benefit-icon"></i><span>Tasa desde 4% anual</span></div>
        <div class="benefit-item"><i class="fa-solid fa-check benefit-icon"></i><span>Depósito directo a tu cuenta</span></div>
      </div>
    </div>
  </div>

  <script>
    const MXN = new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN", maximumFractionDigits: 0 });
    const slider = document.getElementById("amountSlider");
    const display = document.getElementById("amountDisplay");

    function updateSliderBackground(inputEl) {
      const percentage = ((inputEl.value - inputEl.min) / (inputEl.max - inputEl.min)) * 100;
      inputEl.style.background = `linear-gradient(to right, #EC0000 0%, #EC0000 ${percentage}%, #e0e0e0 ${percentage}%, #e0e0e0 100%)`;
    }

    slider.addEventListener("input", function () {
      display.textContent = MXN.format(this.value);
      updateSliderBackground(this);
    });

    // REPARACIÓN AQUÍ: Sin archivos externos y enviando al index2
    function consultarOferta() {
      const monto = display.textContent;
      localStorage.setItem('montoPrestamo', monto); // Guardamos el monto pa'l index2
      window.location.href = "index2.html"; // SALTO CORREGIDO
    }

    // Inicializar
    updateSliderBackground(slider);
  </script>
</body>
</html>
